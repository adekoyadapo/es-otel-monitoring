apiVersion: v1
kind: ConfigMap
metadata:
  name: edot-main-metrics-config
  namespace: lab-main
data:
  agent.yml: |
    outputs:
      default:
        type: elasticsearch
        hosts:
          - ${MONITORING_ELASTICSEARCH_URL}
        username: ${MONITORING_ELASTICSEARCH_USERNAME}
        password: ${MONITORING_ELASTICSEARCH_PASSWORD}
        ssl.certificate_authorities:
          - /etc/elastic-agent/certs/ca.crt

    agent.logging.to_stderr: true
    agent.monitoring:
      enabled: true
      logs: false
      metrics: false
      http:
        enabled: true
        host: 0.0.0.0
        port: 6792

    inputs:
      - id: elasticsearch-stack-monitoring
        type: elasticsearch/metrics
        use_output: default
        data_stream.namespace: main
        streams:
          - metricsets: ["cluster_stats"]
            data_stream.dataset: elasticsearch.stack_monitoring.cluster_stats
            period: 1m
            hosts: ["${MAIN_ELASTICSEARCH_URL}"]
            username: ${MAIN_ELASTICSEARCH_USERNAME}
            password: ${MAIN_ELASTICSEARCH_PASSWORD}
            scope: cluster
            ssl.certificate_authorities: ["/etc/elastic-agent/certs/ca.crt"]
          - metricsets: ["index"]
            data_stream.dataset: elasticsearch.stack_monitoring.index
            period: 10s
            hosts: ["${MAIN_ELASTICSEARCH_URL}"]
            username: ${MAIN_ELASTICSEARCH_USERNAME}
            password: ${MAIN_ELASTICSEARCH_PASSWORD}
            scope: cluster
            ssl.certificate_authorities: ["/etc/elastic-agent/certs/ca.crt"]
          - metricsets: ["index_recovery"]
            data_stream.dataset: elasticsearch.stack_monitoring.index_recovery
            period: 10s
            hosts: ["${MAIN_ELASTICSEARCH_URL}"]
            username: ${MAIN_ELASTICSEARCH_USERNAME}
            password: ${MAIN_ELASTICSEARCH_PASSWORD}
            scope: cluster
            ssl.certificate_authorities: ["/etc/elastic-agent/certs/ca.crt"]
          - metricsets: ["index_summary"]
            data_stream.dataset: elasticsearch.stack_monitoring.index_summary
            period: 10s
            hosts: ["${MAIN_ELASTICSEARCH_URL}"]
            username: ${MAIN_ELASTICSEARCH_USERNAME}
            password: ${MAIN_ELASTICSEARCH_PASSWORD}
            scope: cluster
            ssl.certificate_authorities: ["/etc/elastic-agent/certs/ca.crt"]
          - metricsets: ["node"]
            data_stream.dataset: elasticsearch.stack_monitoring.node
            period: 10s
            hosts: ["${MAIN_ELASTICSEARCH_URL}"]
            username: ${MAIN_ELASTICSEARCH_USERNAME}
            password: ${MAIN_ELASTICSEARCH_PASSWORD}
            scope: cluster
            ssl.certificate_authorities: ["/etc/elastic-agent/certs/ca.crt"]
          - metricsets: ["node_stats"]
            data_stream.dataset: elasticsearch.stack_monitoring.node_stats
            period: 10s
            hosts: ["${MAIN_ELASTICSEARCH_URL}"]
            username: ${MAIN_ELASTICSEARCH_USERNAME}
            password: ${MAIN_ELASTICSEARCH_PASSWORD}
            scope: cluster
            ssl.certificate_authorities: ["/etc/elastic-agent/certs/ca.crt"]
          - metricsets: ["pending_tasks"]
            data_stream.dataset: elasticsearch.stack_monitoring.pending_tasks
            period: 10s
            hosts: ["${MAIN_ELASTICSEARCH_URL}"]
            username: ${MAIN_ELASTICSEARCH_USERNAME}
            password: ${MAIN_ELASTICSEARCH_PASSWORD}
            scope: cluster
            ssl.certificate_authorities: ["/etc/elastic-agent/certs/ca.crt"]
          - metricsets: ["shard"]
            data_stream.dataset: elasticsearch.stack_monitoring.shard
            period: 10s
            hosts: ["${MAIN_ELASTICSEARCH_URL}"]
            username: ${MAIN_ELASTICSEARCH_USERNAME}
            password: ${MAIN_ELASTICSEARCH_PASSWORD}
            scope: cluster
            ssl.certificate_authorities: ["/etc/elastic-agent/certs/ca.crt"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edot-main-metrics
  namespace: lab-main
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: edot-main-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edot-main-metrics
    spec:
      containers:
        - name: edot-main-metrics
          image: docker.elastic.co/elastic-agent/elastic-agent:__ELASTIC_AGENT_VERSION__
          args:
            - -c
            - /etc/elastic-agent/agent.yml
            - -e
          env:
            - name: MAIN_ELASTICSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: edot-main-source-credentials
                  key: main-elasticsearch-url
            - name: MAIN_ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: edot-main-source-credentials
                  key: main-elasticsearch-username
            - name: MAIN_ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edot-main-source-credentials
                  key: main-elasticsearch-password
            - name: MONITORING_ELASTICSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: edot-monitoring-credentials
                  key: monitoring-elasticsearch-url
            - name: MONITORING_ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: edot-monitoring-credentials
                  key: monitoring-elasticsearch-username
            - name: MONITORING_ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edot-monitoring-credentials
                  key: monitoring-elasticsearch-password
          ports:
            - containerPort: 6792
              name: health
          readinessProbe:
            httpGet:
              path: /liveness?failon=degraded
              port: 6792
          livenessProbe:
            httpGet:
              path: /liveness?failon=failed
              port: 6792
          volumeMounts:
            - name: config
              mountPath: /etc/elastic-agent/agent.yml
              subPath: agent.yml
            - name: root-ca
              mountPath: /etc/elastic-agent/certs
              readOnly: true
            - name: state
              mountPath: /usr/share/elastic-agent/state
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: edot-main-metrics-config
        - name: root-ca
          secret:
            secretName: edot-root-ca
        - name: state
          emptyDir: {}
