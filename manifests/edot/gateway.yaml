apiVersion: v1
kind: Service
metadata:
  name: edot-gateway
  namespace: lab-monitoring
spec:
  selector:
    app.kubernetes.io/name: edot-gateway
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edot-gateway-config
  namespace: lab-monitoring
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
      resource/main:
        attributes:
          - key: data_stream.namespace
            action: upsert
            value: main
          - key: orchestrator.cluster.name
            action: upsert
            value: edot-lab
      batch:
        send_batch_size: 1024
        timeout: 5s
      batch/metrics:
        send_batch_max_size: 0
        timeout: 5s

    exporters:
      elasticsearch/monitoring:
        endpoints:
          - ${env:MONITORING_ELASTICSEARCH_URL}
        user: ${env:MONITORING_ELASTICSEARCH_USERNAME}
        password: ${env:MONITORING_ELASTICSEARCH_PASSWORD}
        mapping:
          mode: otel
        tls:
          ca_file: /etc/otel/certs/ca.crt

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resource/main, batch]
          exporters: [elasticsearch/monitoring]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resource/main, batch/metrics]
          exporters: [elasticsearch/monitoring]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edot-gateway
  namespace: lab-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: edot-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edot-gateway
    spec:
      containers:
        - name: edot-gateway
          image: docker.elastic.co/elastic-agent/elastic-otel-collector-wolfi:9.3.3
          args:
            - --config
            - /etc/otel/config.yaml
          env:
            - name: MONITORING_ELASTICSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: edot-monitoring-credentials
                  key: monitoring-elasticsearch-url
            - name: MONITORING_ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: edot-monitoring-credentials
                  key: monitoring-elasticsearch-username
            - name: MONITORING_ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edot-monitoring-credentials
                  key: monitoring-elasticsearch-password
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 13133
              name: health
          readinessProbe:
            httpGet:
              path: /
              port: 13133
          volumeMounts:
            - name: config
              mountPath: /etc/otel
            - name: root-ca
              mountPath: /etc/otel/certs
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: edot-gateway-config
        - name: root-ca
          secret:
            secretName: edot-root-ca
