apiVersion: v1
kind: ConfigMap
metadata:
  name: edot-main-metrics-config
  namespace: lab-main
data:
  config.yaml: |
    receivers:
      metricbeatreceiver/elasticsearch:
        metricbeat:
          modules:
            - module: autoops_es
              period: 10s
              hosts:
                - ${env:MAIN_ELASTICSEARCH_URL}
              metricsets:
                - cat_shards
                - node_stats
                - tasks_management
              username: ${env:MAIN_ELASTICSEARCH_USERNAME}
              password: ${env:MAIN_ELASTICSEARCH_PASSWORD}
              ssl.certificate_authorities:
                - /etc/otel/certs/ca.crt
            - module: autoops_es
              period: 1m
              hosts:
                - ${env:MAIN_ELASTICSEARCH_URL}
              metricsets:
                - cluster_health
                - cluster_settings
              username: ${env:MAIN_ELASTICSEARCH_USERNAME}
              password: ${env:MAIN_ELASTICSEARCH_PASSWORD}
              ssl.certificate_authorities:
                - /etc/otel/certs/ca.crt
        telemetry_types: ["logs"]

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
      attributes/edot_metrics:
        actions:
          - key: data_stream.dataset
            action: upsert
            value: elasticsearch.metrics
          - key: data_stream.namespace
            action: upsert
            value: main
      resource/main:
        attributes:
          - key: service.name
            action: upsert
            value: elasticsearch-main
          - key: service.namespace
            action: upsert
            value: lab-main
          - key: orchestrator.cluster.name
            action: upsert
            value: edot-lab
      batch:
        send_batch_size: 1024
        timeout: 5s

    exporters:
      otlp_grpc/gateway:
        endpoint: edot-gateway.lab-monitoring.svc.cluster.local:4317
        tls:
          insecure: true

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers: [metricbeatreceiver/elasticsearch]
          processors: [memory_limiter, attributes/edot_metrics, resource/main, batch]
          exporters: [otlp_grpc/gateway]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edot-main-metrics
  namespace: lab-main
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: edot-main-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edot-main-metrics
    spec:
      containers:
        - name: edot-main-metrics
          image: docker.elastic.co/elastic-agent/elastic-otel-collector-wolfi:9.3.3
          args:
            - --config
            - /etc/otel/config.yaml
          env:
            - name: MAIN_ELASTICSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: edot-main-source-credentials
                  key: main-elasticsearch-url
            - name: MAIN_ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: edot-main-source-credentials
                  key: main-elasticsearch-username
            - name: MAIN_ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edot-main-source-credentials
                  key: main-elasticsearch-password
          ports:
            - containerPort: 13133
              name: health
          readinessProbe:
            httpGet:
              path: /
              port: 13133
          volumeMounts:
            - name: config
              mountPath: /etc/otel
            - name: root-ca
              mountPath: /etc/otel/certs
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: edot-main-metrics-config
        - name: root-ca
          secret:
            secretName: edot-root-ca
